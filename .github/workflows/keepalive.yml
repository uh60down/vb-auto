name: Keepalive

# GitHub disables scheduled workflows after 60 days with no repository activity.
# This job commits a timestamp once a month so the Auto Quantify cron keeps running.

on:
  schedule:
    - cron: "0 0 1 * *"   # 00:00 UTC on the 1st of every month
  workflow_dispatch:

permissions:
  contents: write

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update keepalive timestamp
        run: |
          date -u +"%Y-%m-%dT%H:%M:%SZ" > .keepalive
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .keepalive
          git commit -m "chore: keepalive $(date -u +%Y-%m-%d)" || exit 0
          git push

name: Auto Quantify

on:
  schedule:
    - cron: "37 * * * *"
  workflow_dispatch:

jobs:
  quantify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Run quantify script
        env:
          VB_ID_CODE: ${{ secrets.VB_ID_CODE }}
          VB_ID_PHONENUMBER: ${{ secrets.VB_ID_PHONENUMBER }}
          VB_PASSWORD: ${{ secrets.VB_PASSWORD }}
        run: python quantify.py

      - name: Upload debug screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: login-debug-screenshots
          path: "*.png"
          if-no-files-found: ignore

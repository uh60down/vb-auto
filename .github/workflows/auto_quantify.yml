name: Auto Quantify

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  quantify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Run quantify script
        env:
          VB_EMAIL: ${{ secrets.VB_EMAIL }}
          VB_PASSWORD: ${{ secrets.VB_PASSWORD }}
        run: python quantify.py
